# ROADMAP.yaml — CyTrace Autopilot 任務清單
# 使用方式：人類 /asp:approve-adr 升 ADR 為 Accepted → /asp-autopilot 逐任務執行
# Autopilot 依 stack/requires 自動載入 profile 並動態探測前置文件（SRS/SDS/UIUX_SPEC）。
# 注意：ADR 仍為 Draft 時，依賴該 ADR 的實作任務會被 autopilot 標記 blocked（鐵則：Draft 禁止實作）。

version: "1.0"
project: CyTrace
last_updated: 2026-07-02

# ═══ 專案元資料 ═══

stack:
  frontend: react          # 報表檢視器（visual-web-stack DOM/UI 子集）
  backend: rust            # CLI 核心（Cargo workspace）
  database: none
  infra: none              # air-gapped 單包交付，無 k8s/serverless

requires:
  uiux: true               # → 載入 design_dev + frontend_quality，要求 docs/UIUX_SPEC.md
  api: true                # M8：serve REST API（/api/v1；契約文件化於 SDS server 章，無對外 OpenAPI 交付）
  multi_agent: false
  rag: false
  coding_style: true

conventions:
  language: zh-TW
  naming: snake_case
  error_handling: result_type    # Rust：anyhow + thiserror
  commit_format: conventional
  branch_strategy: github-flow

architecture:
  style: monolith
  api_style: rest               # M8：serve 子命令 /api/v1（ADR-011）；CLI 模式不受影響
  auth: session                 # M8：單一管理帳號 argon2 + session cookie（ADR-011）；CLI 模式無帳號
  message_queue: none
  cache: none
  search: none

integrations: []

quality:
  test_coverage_target: 80%
  e2e_required: false
  performance_budget: false
  accessibility: WCAG-2.1-AA     # 報表檢視器

security:
  compliance: []                 # 參考 NTIA SBOM Minimum Elements；軍規 SBOM（SRS §5）
  auth_requirements:             # M8 serve 模式（ADR-011）；CLI 模式仍無帳號
    mfa: false                   # 封閉網路單一管理帳號，無外部 IdP（使用者確認）
    session_timeout: 12h         # 絕對過期，不 sliding
    password_policy: "min_length 12（argon2id PHC；cytrace hash-password 離線產生）"

observability:
  logging: structured
  metrics: none
  tracing: none
  alerting: none

documents:
  srs: docs/SRS.md
  sds: docs/SDS.md
  uiux_spec: docs/UIUX_SPEC.md

# ── NFR → 任務 追溯（文件用；autopilot 只讀 srs_ref/FR，此表供稽核對照）──
nfr_traceability:
  NFR-01-zero-network: [T303, T301]        # 報表零外連 / CSP
  NFR-02-stability:    [T002, T503]        # 釘選 + golden baseline（ADR-008）
  NFR-03-auditable:    [T402]              # SHA256SUMS + 簽章驗章
  NFR-04-portable:     [T303, T401]        # 單檔報表 / musl 單一 binary
  NFR-05-clean-supply: [T403]              # NOTICE + 自產 SBOM、禁中國來源
  NFR-06-i18n:         [T003]              # 遞迴鍵集合一致檢查
  NFR-07-coverage:     [T202, T203, T503]  # 單元 + 整合 + 回歸（ADR-008）
  NFR-08-a11y:         [T301]              # WCAG-2.1-AA
  NFR-09-trust-bound:  [T102, T103]        # 目標/原始碼不離開目標機
  NFR-10-disclaimer:   [T301, T302]        # 報表非滲透測試免責定位

